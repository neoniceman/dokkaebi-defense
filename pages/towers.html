<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>성채 수호전 — 방어탑 도감</title>
<style>
  :root{ --ink:#241c16; --bone:#f3ead6; --cheong:#2f6f8f; --jeok:#c8442e;
    --hwang:#e0a82e; --heuk:#1d1712; --moss:#5d7a4f; }
  *{box-sizing:border-box;}
  body{margin:0; background:#1d1712; color:var(--bone);
    font-family:'Gowun Batang','Nanum Myeongjo',ui-serif,Georgia,serif;
    background-image:radial-gradient(120% 80% at 50% -10%, #3a2c20 0%, #1d1712 60%);}
  header{text-align:center; padding:30px 20px 6px;}
  header h1{margin:0; font-size:26px; letter-spacing:.1em; color:var(--hwang); text-shadow:2px 2px 0 #000;}
  header h1 .b{color:var(--jeok);}
  header p{margin:8px 0 0; font-size:13px; opacity:.65; letter-spacing:.08em;}
  .rule{width:60px; height:3px; background:var(--jeok); margin:16px auto 0; border-radius:2px;}
  .grid{display:grid; gap:18px; padding:24px 18px 50px; max-width:1080px; margin:0 auto;
    grid-template-columns:repeat(auto-fill,minmax(290px,1fr));}
  .card{background:var(--bone); border:3px solid var(--ink); border-radius:9px;
    overflow:hidden; box-shadow:0 8px 0 #00000055; color:var(--ink); display:flex; flex-direction:column;}
  .card .top{display:flex; align-items:center; gap:9px; padding:12px 15px;
    border-bottom:2px solid var(--ink); background:#efe4ce;}
  .card .nm{font-size:19px; font-weight:700; letter-spacing:.04em;}
  .card .nm small{display:block; font-size:11px; opacity:.55; font-weight:400;}
  .card .cost{margin-left:auto; font-size:12.5px; font-weight:700; color:#9a5b1e;}
  .portrait{display:flex; align-items:flex-end; justify-content:center; height:150px; padding:6px;
    background:radial-gradient(60% 80% at 50% 50%, #efe4ce 0%, #ddccab 100%);}
  .portrait img{max-height:138px; max-width:78%; image-rendering:auto; filter:drop-shadow(0 4px 3px #0003);}
  .desc{padding:11px 15px 4px; font-size:13px; line-height:1.55; color:#4a3c2c;}
  .kind{display:inline-block; margin:0 15px 6px; font-size:11px; padding:3px 9px;
    border-radius:11px; color:#fff; background:#2f6f8f;}
  .stats{padding:2px 15px 16px;}
  .row{display:flex; align-items:center; gap:9px; margin:6px 0; font-size:12px;}
  .row .lab{width:48px; color:#7a6a52; flex:0 0 auto;}
  .bar{flex:1; height:9px; background:#d8c9a8; border-radius:5px; overflow:hidden; border:1px solid #00000022;}
  .bar i{display:block; height:100%; border-radius:5px;}
  .row .val{width:34px; text-align:right; font-variant-numeric:tabular-nums; color:var(--ink); font-weight:700;}
  footer{text-align:center; font-size:11px; opacity:.4; padding:0 0 30px;}
</style>
</head>
<body>
<header>
  <h1><span class="b">성채</span> 수호전 · 방어탑 도감</h1>
  <p>성을 지키는 일곱 방어 유닛</p>
  <div class="rule"></div>
</header>
<div class="grid" id="grid"></div>
<footer>성채 수호전 — 방어탑 도감</footer>
<script>
const KINDCOL={단일:'#2f6f8f',범위:'#c8442e',둔화:'#5f93a8'};
const TW=[
 {u:'archer',nm:'궁수탑',sub:'궁수',cost:50,kind:'단일',dmg:14,range:2.4,rate:0.8,d:'길목을 지키는 기본 궁수. 꾸준한 단일 명중으로 초반을 받친다.'},
 {u:'elf',nm:'석궁탑',sub:'엘프',cost:70,kind:'단일',dmg:5,range:3.0,rate:0.35,d:'엘프 사수의 빠른 연사. 한 발은 약해도 쉴 새 없이 쏘아댄다.'},
 {u:'wizard',nm:'흑마법탑',sub:'마법사',cost:90,kind:'범위',dmg:9,range:1.9,rate:1.3,d:'화염을 뿜는 흑마법사. 뭉친 무리에 범위 피해를 입힌다.'},
 {u:'druid',nm:'빙결탑',sub:'드루이드',cost:80,kind:'둔화',dmg:4,range:2.6,rate:1.1,d:'서리 마법으로 적을 얼려 둔화시킨다. 피해는 적지만 발을 묶는다.'},
 {u:'viking',nm:'전사 병영',sub:'바이킹',cost:140,kind:'단일',dmg:42,range:3.2,rate:1.6,d:'일격필살의 바이킹 전사. 느리지만 묵직한 한 방을 꽂는다.'},
 {u:'wizard2',nm:'비전 마법탑',sub:'대마법사',cost:120,kind:'단일',dmg:55,range:3.5,rate:1.4,d:'먼 거리에서 고위력 비전 마법을 쏘는 저격형. 방어무시·처형으로 성장한다.'},
 {u:'ent',nm:'포탑',sub:'엔트',cost:110,kind:'범위',dmg:30,range:2.6,rate:1.8,d:'거대 엔트의 범위 포격. 느리지만 강력하게 일대를 쓸어버린다.'},
];
const grid=document.getElementById('grid');
const mx={dmg:55,range:3.5,rate:1.8};
TW.forEach(t=>{
  const el=document.createElement('div'); el.className='card';
  const kc=KINDCOL[t.kind]||'#2f6f8f';
  const speedPct=(1 - (t.rate/mx.rate))*100*0.85+15;
  el.innerHTML=
   '<div class="top"><span class="nm">'+t.nm+'<small>'+t.sub+'</small></span><span class="cost">금화 '+t.cost+'</span></div>'+
   '<div class="portrait"><img src="../assets/units/'+t.u+'/idle/f0.png" alt="'+t.nm+'"></div>'+
   '<span class="kind" style="background:'+kc+'">'+t.kind+'</span>'+
   '<div class="desc">'+t.d+'</div>'+
   '<div class="stats">'+
     '<div class="row"><span class="lab">피해</span><div class="bar"><i style="width:'+(t.dmg/mx.dmg*100)+'%;background:#c8442e"></i></div><span class="val">'+t.dmg+'</span></div>'+
     '<div class="row"><span class="lab">사거리</span><div class="bar"><i style="width:'+(t.range/mx.range*100)+'%;background:#2f6f8f"></i></div><span class="val">'+t.range+'</span></div>'+
     '<div class="row"><span class="lab">공격속도</span><div class="bar"><i style="width:'+speedPct+'%;background:#5d7a4f"></i></div><span class="val">'+t.rate+'s</span></div>'+
   '</div>';
  grid.appendChild(el);
});
</script>
</body>
</html>
