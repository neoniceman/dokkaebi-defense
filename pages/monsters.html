<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>성채 수호전 — 마물 도감</title>
<style>
  :root{ --ink:#241c16; --bone:#f3ead6; --cheong:#2f6f8f; --jeok:#c8442e;
    --hwang:#e0a82e; --heuk:#1d1712; --moss:#5d7a4f; }
  *{box-sizing:border-box;}
  body{margin:0; background:#1d1712; color:var(--bone);
    font-family:'Gowun Batang','Nanum Myeongjo',ui-serif,Georgia,serif;
    background-image:radial-gradient(120% 80% at 50% -10%, #3a2c20 0%, #1d1712 60%);}
  header{text-align:center; padding:30px 20px 6px;}
  header h1{margin:0; font-size:26px; letter-spacing:.1em; color:var(--hwang); text-shadow:2px 2px 0 #000;}
  header h1 .b{color:var(--jeok);}
  header p{margin:8px 0 0; font-size:13px; opacity:.65; letter-spacing:.08em;}
  .rule{width:60px; height:3px; background:var(--jeok); margin:16px auto 0; border-radius:2px;}
  .grid{display:grid; gap:18px; padding:24px 18px 50px; max-width:1080px; margin:0 auto;
    grid-template-columns:repeat(auto-fill,minmax(290px,1fr));}
  .card{background:var(--bone); border:3px solid var(--ink); border-radius:9px;
    overflow:hidden; box-shadow:0 8px 0 #00000055; color:var(--ink); display:flex; flex-direction:column;}
  .card .top{display:flex; align-items:center; gap:9px; padding:12px 15px;
    border-bottom:2px solid var(--ink); background:#efe4ce;}
  .card .idx{font-size:12px; font-weight:700; color:#fff; background:var(--ink);
    width:24px; height:24px; border-radius:50%; display:grid; place-items:center; flex:0 0 auto;}
  .card .nm{font-size:19px; font-weight:700; letter-spacing:.04em;}
  .card .tier{margin-left:auto; font-size:10.5px; letter-spacing:.08em; color:#fff; padding:3px 9px; border-radius:11px;}
  .portrait{display:flex; align-items:flex-end; justify-content:center; height:140px; padding:6px;
    background:radial-gradient(60% 80% at 50% 45%, #efe4ce 0%, #ddccab 100%);}
  .portrait img{max-height:128px; max-width:80%; image-rendering:auto; filter:drop-shadow(0 4px 3px #0003);}
  .desc{padding:11px 15px 4px; font-size:13px; line-height:1.55; color:#4a3c2c;}
  .stats{padding:4px 15px 16px;}
  .row{display:flex; align-items:center; gap:9px; margin:6px 0; font-size:12px;}
  .row .lab{width:42px; color:#7a6a52; flex:0 0 auto;}
  .bar{flex:1; height:9px; background:#d8c9a8; border-radius:5px; overflow:hidden; border:1px solid #00000022;}
  .bar i{display:block; height:100%; border-radius:5px;}
  .row .val{width:34px; text-align:right; font-variant-numeric:tabular-nums; color:var(--ink); font-weight:700;}
  footer{text-align:center; font-size:11px; opacity:.4; padding:0 0 30px;}
</style>
</head>
<body>
<header>
  <h1><span class="b">성채</span> 수호전 · 마물 도감</h1>
  <p>성을 노리고 몰려오는 마물들의 생김과 성질</p>
  <div class="rule"></div>
</header>
<div class="grid" id="grid"></div>
<footer>성채 수호전 — 마물 도감</footer>
<script>
const TIERCOL={잡졸:'#6b5d8a',쾌속:'#4f8a6b',중장:'#8a4f4f',희귀:'#c8442e',특수:'#7a8a4f',후반:'#5b6b78',보스:'#7a2f55'};
// sprite = 게임 적 스프라이트 폴더, hp/spd/armor = 기준 스탯(웨이브 스케일 전)
const MON=[
 {s:'goblin',nm:'고블린',tier:'잡졸',hp:34,spd:46,ar:0,d:'성문을 가장 먼저 두드리는 흔한 고블린. 약하지만 수가 많아 방심하면 성벽을 민다.'},
 {s:'bat',nm:'그림자 박쥐',tier:'쾌속',hp:22,spd:82,ar:0,d:'날개로 전장을 빠르게 가로지른다. 체력은 낮으나 사거리 짧은 탑은 놓치기 쉽다.'},
 {s:'ogre',nm:'오우거',tier:'중장',hp:120,spd:30,ar:0,d:'우람한 거구. 굼뜨지만 체력이 두꺼워 화력을 집중하지 않으면 끝까지 버틴다.'},
 {s:'imp',nm:'보물 임프',tier:'희귀',hp:50,spd:60,ar:0,d:'처치하면 금화를 듬뿍 떨군다. 절대 흘려보내지 말 것.'},
 {s:'darkgob',nm:'분열 고블린',tier:'특수',hp:46,spd:50,ar:0,d:'쓰러지면 둘로 갈라진다. 광역 화력으로 한 번에 정리해야 한다.'},
 {s:'brute',nm:'중갑병',tier:'후반',hp:140,spd:34,ar:7,d:'두꺼운 판금을 둘렀다. 타격마다 방어력만큼 피해가 깎여 약한 연사는 거의 통하지 않는다.'},
 {s:'orc',nm:'광전사 오크',tier:'후반',hp:60,spd:120,ar:0,d:'전장을 쏜살같이 가로지른다. 공속·사거리를 강화한 탑이라야 잡을 수 있다.'},
 {s:'king',nm:'주술사',tier:'후반',hp:90,spd:42,ar:0,d:'스스로 상처를 치유한다. 순간 화력이나 범위 폭발로 단숨에 끝내야 한다.'},
 {s:'yeti',nm:'설인',tier:'후반',hp:130,spd:70,ar:0,d:'빠른 데다 자가회복까지 하는 거구. 화력이 모자라면 끝없이 버틴다.'},
 {s:'mage',nm:'흑마법사',tier:'후반',hp:78,spd:92,ar:0,d:'저체력이나 매우 빠르다. 사거리 안에 오래 두지 못하면 그대로 성벽까지 닿는다.'},
 {s:'steel',nm:'강철 마귀',tier:'후반',hp:140,spd:38,ar:11,d:'초중장갑의 마귀. 방어무시나 고피해 한 방이 아니면 거의 흠집조차 나지 않는다.'},
 {s:'swordsman',nm:'대검 기사',tier:'후반',hp:185,spd:46,ar:5,d:'체력과 속도, 방어가 고루 균형 잡힌 브루저. 어중간한 방어선은 그냥 밀어버린다.'},
 {s:'dknight',nm:'흑기사',tier:'후반',hp:340,spd:30,ar:6,d:'압도적인 체력의 거대 탱크. 집중 포화가 아니면 성문 앞까지 살아서 닿는다.'},
 {s:'boss',nm:'마왕',tier:'보스',hp:1400,spd:24,ar:5,d:'12물결부터 5물결마다 강림. 마왕·돌 골렘·해골 기사·심연의 군주 넷이 번갈아 나타난다.'},
];
const grid=document.getElementById('grid');
const mx={hp:1400,spd:120,ar:12};
MON.forEach((m,i)=>{
  const el=document.createElement('div'); el.className='card';
  const tc=TIERCOL[m.tier]||'#5b6b78';
  el.innerHTML=
   '<div class="top"><span class="idx">'+(i+1)+'</span><span class="nm">'+m.nm+'</span>'+
     '<span class="tier" style="background:'+tc+'">'+m.tier+'</span></div>'+
   '<div class="portrait"><img src="../assets/enemies/'+m.s+'/f0.png" alt="'+m.nm+'"></div>'+
   '<div class="desc">'+m.d+'</div>'+
   '<div class="stats">'+
     '<div class="row"><span class="lab">체력</span><div class="bar"><i style="width:'+Math.min(100,m.hp/mx.hp*100)+'%;background:#c8442e"></i></div><span class="val">'+m.hp+'</span></div>'+
     '<div class="row"><span class="lab">속도</span><div class="bar"><i style="width:'+(m.spd/mx.spd*100)+'%;background:#2f6f8f"></i></div><span class="val">'+m.spd+'</span></div>'+
     '<div class="row"><span class="lab">방어</span><div class="bar"><i style="width:'+(m.ar/mx.ar*100)+'%;background:#5d7a4f"></i></div><span class="val">'+m.ar+'</span></div>'+
   '</div>';
  grid.appendChild(el);
});
</script>
</body>
</html>
